<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="build-a-page-of-playing-cards.css">
</head>
<body>
    <main id="playing-cards">
        
        <div class="card spade">
            <div class="left">A<br />♠</div>
            <div class="middle">
                <span>♠</span>
            </div>
            <div class="right">A<br>♠</div>
        </div>
        
        <div class="card clubs">
            <div class="left">A<br />♣</div>
            <div class="middle">
            <span>♣</span>
            </div>
            <div class="right">A<br />♣</div>
        </div>

        <div class="card heart">
            <div class="left">2<br>♥</div>
            <div class="middle">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="right">2<br>♥</div>
        </div>

        <div class="card diamond">
            <div class="left">K<br>♦</div>
            <div class="middle">
                <span>♦</span>
                <span>♚</span>
                <span>♦</span>
            </div>
            <div class="right">K<br>♦</div>
        </div>

    </main>
</body>
</html>
