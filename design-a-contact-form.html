<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="design-a-contact-form.css" />
</head>

<body>
    <div class="form-container">
    <form class="form-container">
        <h2>Contact Form</h2>
        <label for="text">Name: <input type="text" id="text" name="text" required /></label>
        <label for="email">Email: <input type="email" id="email" name="email" required /></label>
        <label for="area">Message: <textarea id="area" name="area" required></textarea></label>
        <button type="submit" value="Submit">Submit</button>
    </form>
    </div>
</body>

</html>
