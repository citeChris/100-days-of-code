<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>citeChris — Homescreen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00ff87;
    --green-dim: #00c46a;
    --green-pale: rgba(0,255,135,0.12);
    --green-glow: rgba(0,255,135,0.06);
    --dark: #060a06;
    --mid: #0d1a0d;
    --text: #e8f5e8;
    --muted: rgba(232,245,232,0.45);
    --accent: #ff6b35;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    cursor: none;
  }

  /* ── scanline overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── vignette ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* ── animated grid bg ── */
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,135,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,135,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }

  @keyframes gridShift {
    0%  { background-position: 0 0; }
    100%{ background-position: 60px 60px; }
  }

  /* ── floating code snippets ── */
  .floaters {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .snippet {
    position: absolute;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(0,255,135,0.18);
    white-space: nowrap;
    animation: floatUp linear infinite;
    user-select: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh); opacity: 0; }
    5%   { opacity: 1; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-20vh); opacity: 0; }
  }

  /* ── corner markers ── */
  .corner {
    position: fixed;
    width: 28px; height: 28px;
    border-color: var(--green-dim);
    border-style: solid;
    opacity: 0.6;
    z-index: 10;
  }
  .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

  /* ── status bar (top) ── */
  .status-bar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 52px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(0,255,135,0.4);
    z-index: 10;
    border-bottom: 1px solid rgba(0,255,135,0.06);
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── main center content ── */
  .center {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    gap: 0;
  }

  .prompt-line {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--green-dim);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.4s;
  }

  .prompt-line span { color: var(--muted); }

  .greeting {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(52px, 9vw, 120px);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    position: relative;
    opacity: 0;
    animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.7s;
  }

  .greeting .accent { color: var(--green); }
  .greeting .comma  { color: var(--accent); }

  .tagline {
    font-size: clamp(13px, 1.4vw, 18px);
    color: var(--muted);
    margin-top: 20px;
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.3s;
  }

  .tagline .highlight { color: var(--green); font-weight: 700; }

  /* ── handle badge ── */
  .handle {
    display: flex; align-items: center; gap: 10px;
    margin-top: 36px;
    padding: 10px 22px;
    border: 1px solid rgba(0,255,135,0.25);
    border-radius: 2px;
    background: rgba(0,255,135,0.04);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.6s;
  }

  .handle-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .handle-text {
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--green-dim);
    text-transform: uppercase;
  }

  /* ── progress bar ── */
  .progress-wrap {
    margin-top: 42px;
    width: min(320px, 80vw);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2s;
  }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: rgba(0,255,135,0.4);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 2px;
    background: rgba(0,255,135,0.1);
    border-radius: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    animation: load 3s cubic-bezier(0.25,0,0,1) forwards 2.2s;
    width: 0%;
  }

  @keyframes load {
    0%  { width: 0%; }
    60% { width: 72%; }
    80% { width: 85%; }
    100%{ width: 100%; }
  }

  /* ── bottom bar ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 52px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(0,255,135,0.3);
    z-index: 10;
    border-top: 1px solid rgba(0,255,135,0.06);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2.5s;
  }

  /* ── side decorations ── */
  .side-left, .side-right {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 6px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2s;
  }
  .side-left { left: 24px; }
  .side-right { right: 24px; }

  .side-tick {
    width: 14px; height: 1px;
    background: rgba(0,255,135,0.25);
  }
  .side-tick:nth-child(3) { width: 20px; background: rgba(0,255,135,0.5); }

  /* ── custom cursor ── */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    border: 1.5px solid var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    transform: translate(-50%,-50%);
  }

  /* ── animations ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── blinking cursor after greeting ── */
  .blink-cursor {
    display: inline-block;
    width: 3px; height: 0.85em;
    background: var(--green);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
    opacity: 0;
    animation-delay: 1.8s;
  }

  @keyframes blink {
    0%,100%{ opacity: 0; }
    50%    { opacity: 1; }
  }
</style>
</head>
<body>

<!-- grid bg -->
<div class="grid-bg"></div>

<!-- floating code snippets -->
<div class="floaters" id="floaters"></div>

<!-- corners -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- side ticks -->
<div class="side-left">
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
</div>
<div class="side-right">
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
  <div class="side-tick"></div>
</div>

<!-- top status bar -->
<div class="status-bar">
  <div><span class="status-dot"></span>SYSTEM ONLINE</div>
  <div>citeChris.dev — SESSION ACTIVE</div>
  <div>#100DaysOfCode</div>
</div>

<!-- center content -->
<div class="center">
  <div class="prompt-line"><span>~/citeChris $</span> ./init.sh</div>

  <div class="greeting">
    Hello<span class="comma">,</span> <span class="accent">World</span><span class="blink-cursor"></span>
  </div>

  <div class="tagline">
    Building in public · JavaScript · <span class="highlight">SecureVault</span> · Ibadan, NG
  </div>

  <div class="handle">
    <div class="handle-icon"></div>
    <div class="handle-text">@citeChris · Junior Developer · Day 1 of ∞</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>LOADING SKILLS</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="pfill"></div>
    </div>
  </div>
</div>

<!-- bottom bar -->
<div class="bottom-bar">
  <div>ASPIRING SOFTWARE ENGINEER</div>
  <div>UI · JS · PYTHON · SECURITY</div>
  <div>EST. 2024</div>
</div>

<!-- cursor -->
<div class="cursor" id="cursor"></div>

<script>
  // cursor
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  // progress percentage counter
  const pct = document.getElementById('pct');
  const pfill = document.getElementById('pfill');
  let val = 0;
  const targets = [
    {t:72,  delay:2200},
    {t:85,  delay:4000},
    {t:100, delay:5200}
  ];

  targets.forEach(({t, delay}) => {
    setTimeout(() => {
      const interval = setInterval(() => {
        if (val >= t) { clearInterval(interval); return; }
        val++;
        pct.textContent = val + '%';
      }, 18);
    }, delay);
  });

  // floating code snippets
  const lines = [
    'const secure = true;',
    'if (password.length >= 12)',
    'fetch("/api/check-pwned")',
    'let streak = 100;',
    'npm run build',
    'git push origin main',
    'import { encrypt } from "./lib"',
    'function validateForm(input)',
    '> #100DaysOfCode Day 47',
    'const hash = sha256(pw)',
    'addEventListener("submit")',
    'return res.json({ safe: true })',
    'pip install flask',
    'SELECT * FROM users',
    'document.querySelector(".hero")',
    '// TODO: ship SecureVault',
    'response.status(200).send()',
    'const entropy = calcStrength(pw)',
    'export default function App()',
    'git commit -m "feat: day 50"',
  ];

  const container = document.getElementById('floaters');

  function spawnSnippet() {
    const el = document.createElement('div');
    el.className = 'snippet';
    el.textContent = lines[Math.floor(Math.random() * lines.length)];
    el.style.left = Math.random() * 96 + '%';
    const dur = 14 + Math.random() * 18;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * -dur) + 's';
    el.style.fontSize = (9 + Math.random() * 4) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }

  for (let i = 0; i < 28; i++) spawnSnippet();
  setInterval(spawnSnippet, 1800);
</script>
</body>
</html>
