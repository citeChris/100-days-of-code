<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Availability Schedule</title>
  <link rel="stylesheet" href="build-an-availability-table.css">
</head>
<body>

  <table>
    <tr>
      <th>Time</th>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th>
    </tr>

    <tr class="sharp">
      <th class="time">09:00 AM</th>
      <td class="available-0"></td>
      <td class="available-1"></td>
      <td class="available-5"></td>
    </tr>
    
    <tr class="half">
      <th class="time">09:30 AM</th>
      <td class="available-2"></td>
      <td class="available-3"></td>
      <td class="available-4"></td>
    </tr>
    
    <tr class="sharp">
      <th class="time">10:00 AM</th>
      <td class="available-5"></td>
      <td class="available-0"></td>
      <td class="available-2"></td>
    </tr>
    
    <tr class="half">
      <th class="time">10:30 AM</th>
      <td class="available-4"></td>
      <td class="available-1"></td>
      <td class="available-3"></td>
    </tr>
  </table>

  <div id="legend">
    <span>Availability</span>
    <div id="legend-gradient"></div>
  </div>

</body>
</html>
